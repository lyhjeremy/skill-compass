name: Deploy backend to Hugging Face Space
on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires repo secrets: HF_TOKEN (write), and variable HF_SPACE (e.g. lyhjeremy/skillcompass-api)
    steps:
      - uses: actions/checkout@v4
      - name: Push backend/ to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "HF_TOKEN/HF_SPACE not configured yet - skipping (Phase 0 pending HF account)."
            exit 0
          fi
          # Deploy as a normal incremental commit on the Space's real history
          # (clone -> replace files -> commit -> push), NOT a fresh orphan
          # git-init + force-push every run. Repeated unrelated-history force
          # pushes proved unreliable in practice — Spaces sometimes never
          # rebuilt despite the push and a restart call both reporting success.
          rm -rf /tmp/space_deploy
          git clone --depth 1 "https://lyhjeremy:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" /tmp/space_deploy
          find /tmp/space_deploy -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a backend/. /tmp/space_deploy/
          cd /tmp/space_deploy
          git config user.name "Jeremy Lee"
          git config user.email "lyhjeremy@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes to deploy."
          else
            git commit -m "Deploy backend: ${GITHUB_SHA::7}"
            git push origin HEAD:main
            echo "Pushed incremental commit $(git rev-parse --short HEAD)."
          fi
          # A plain "restart" can just restart the *existing* container without
          # forcing a fresh Docker build from the latest commit — observed the
          # Space serving a stale build for 15+ minutes after a verified-correct
          # push, and even factory=true alone left it stuck reporting
          # RUNNING_APP_STARTING against the old build. Pause -> factory-reboot
          # is a community-reported workaround for a Space stuck in that state.
          # Non-fatal: don't let a reboot-call hiccup fail the deploy when the push succeeded.
          curl -s -o /tmp/pause_resp.json -w "pause -> HTTP %{http_code}\n" -X POST \
            "https://huggingface.co/api/spaces/${HF_SPACE}/pause" \
            -H "Authorization: Bearer ${HF_TOKEN}" || true
          cat /tmp/pause_resp.json 2>/dev/null; echo
          sleep 5
          HTTP_CODE=$(curl -s -o /tmp/reboot_resp.json -w "%{http_code}" -X POST \
            "https://huggingface.co/api/spaces/${HF_SPACE}/restart?factory=true" \
            -H "Authorization: Bearer ${HF_TOKEN}") || true
          echo "restart(factory=true) -> HTTP $HTTP_CODE: $(cat /tmp/reboot_resp.json 2>/dev/null)"
